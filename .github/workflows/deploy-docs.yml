name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Enable by setting repo variable DEPLOY_DOCS=true and adding the two
    # CLOUDFLARE_* secrets below. Skipped (not failed) until then — the site is
    # deployed with `wrangler pages deploy docs/.vitepress/dist` in the meantime.
    if: ${{ vars.DEPLOY_DOCS == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # for lastUpdated timestamps

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.vitepress/dist --project-name=stripekit --branch=main
